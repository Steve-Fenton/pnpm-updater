name: 'PNPM Updater'
description: 'Automatically update dependencies using pnpm and create a pull request'
author: 'Steve Fenton'
inputs:
  github_token:
    description: 'GitHub token'
    required: true
    default: ${{ github.token }}
  node_version:
    description: 'Node version'
    required: true
    default: 'latest'
  pnpm_version:
    description: 'pnpm version'
    required: true
    default: 'latest'
  update_script:
    description: 'The script to run to update dependencies'
    required: true
    default: 'pnpm update --latest'

runs:
  using: 'composite'
  steps:
    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node_version }}
       
    - name: Install pnpm
      run: npm install -g pnpm@${{ inputs.pnpm_version }}
      shell: bash

    - name: Install dependencies
      run: pnpm install
      shell: bash

    - name: Run update script
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        ${{ inputs.update_script }}
      shell: bash
          
    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v8
      with:
        token: ${{ inputs.github_token }}
        commit-message: "chore(deps): update dependencies"
        title: "chore(deps): automated dependency update"
        body: "Automated PR to update all dependencies via `${{ inputs.update_script }}`."
        branch: update-dependencies
        base: main

branding:
  icon: 'refresh-cw'
  color: 'blue'
